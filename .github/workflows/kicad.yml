on:
  push:
    branches: [main]
    paths-ignore:
      - 'output/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'output/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  kicad_job:
    runs-on: ubuntu-latest
    name: Run Kicad Jobs
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Export production files
        id: production
        uses: sparkengineering/kicad-action@v4
        if: '!cancelled()'
        with:
          kicad_sch: DummyLoad.kicad_sch
          sch_pdf: true # Generate PDF
          sch_bom: true # Generate BOM
          kicad_pcb: DummyLoad.kicad_pcb
          pcb_gerbers: true # Generate Gerbers
          schematic_output_bom_fields: Reference,Value,Footprint,${QUANTITY},${DNP},Mouser PN,Datasheet
          schematic_output_bom_labels: Refs,Value,Footprint,Qty,DNP,Mouser PN,Datasheet

      - name: Prepare output folder
        if: ${{ !cancelled() && steps.production.conclusion == 'success' }}
        run: |
          mkdir -p output
          cp -f "${{ github.workspace }}/sch.pdf" output/schematic.pdf
          cp -f "${{ github.workspace }}/bom.csv" output/bom.csv
          cp -f "${{ github.workspace }}/gbr.zip" output/gerbers.zip

      - name: Commit generated outputs
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && !cancelled() && steps.production.conclusion == 'success' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --cached --quiet; then
            echo "No output changes to commit."
            exit 0
          fi
          git commit -m "chore(kicad): update generated outputs [skip ci]"
          git push

      # Upload production files only if generation succeeded
      - name: Upload production files
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() && steps.production.conclusion == 'success' }}
        with:
          name: Production files
          path: |
            ${{ github.workspace }}/output/schematic.pdf
            ${{ github.workspace }}/output/bom.csv
            ${{ github.workspace }}/output/gerbers.zip

      - name: Run KiCad ERC
        id: erc
        uses: sparkengineering/kicad-action@v4
        if: '!cancelled()'
        with:
          kicad_sch: DummyLoad.kicad_sch
          sch_erc: true

      - name: Run KiCad DRC
        id: drc
        uses: sparkengineering/kicad-action@v4
        if: '!cancelled()'
        with:
          kicad_pcb: DummyLoad.kicad_pcb
          pcb_drc: true

      # Upload ERC report only if ERC failed
      - name: Upload ERC report
        uses: actions/upload-artifact@v4
        if: ${{ failure() && steps.erc.conclusion == 'failure' }}
        with:
          name: erc.rpt
          path: ${{ github.workspace }}/erc.rpt

      # Upload DRC report only if DRC failed
      - name: Upload DRC report
        uses: actions/upload-artifact@v4
        if: ${{ failure() && steps.drc.conclusion == 'failure' }}
        with:
          name: drc.rpt
          path: ${{ github.workspace }}/drc.rpt
