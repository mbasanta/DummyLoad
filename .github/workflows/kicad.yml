on:
  push:
    branches: [main]
    paths-ignore:
      - 'output/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'output/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  kicad_job:
    runs-on: ubuntu-latest
    name: Run KiCad Jobs

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run KiCad Actions
        id: production
        uses: actions-for-kicad/kicad-actions@v1.8-k9.0
        with:
          dir: .
          schematic_file: DummyLoad.kicad_sch
          pcb_file: DummyLoad.kicad_pcb
          sch_pdf: true
          sch_pdf_file: sch.pdf
          sch_bom: true
          sch_bom_file: bom.csv
          pcb_gerbers: true
          pcb_gerbers_file: gbr.zip

      - name: Verify KiCad step succeeded
        if: ${{ steps.production.outcome != 'success' }}
        run: |
          echo "KiCad production step failed; stopping workflow."
          exit 1

      - name: Prepare output folder
        if: ${{ !cancelled() && steps.production.outcome == 'success' }}
        run: |
          set -euo pipefail
          mkdir -p output

          cp -f "${{ github.workspace }}/sch.pdf" output/schematic.pdf
          cp -f "${{ github.workspace }}/bom.csv" output/bom.csv
          cp -f "${{ github.workspace }}/gbr.zip" output/gerbers.zip

          ls -la output

      - name: Commit generated outputs
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && !cancelled() && steps.production.outcome == 'success' }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f output/schematic.pdf output/bom.csv output/gerbers.zip

          if git diff --cached --quiet; then
            echo "No output changes to commit."
            exit 0
          fi

          git commit -m "chore(kicad): update generated outputs [skip ci]"
          git push

      - name: Upload production files
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() && steps.production.outcome == 'success' }}
        with:
          name: Production files
          path: |
            ${{ github.workspace }}/output/schematic.pdf
            ${{ github.workspace }}/output/bom.csv
            ${{ github.workspace }}/output/gerbers.zip
