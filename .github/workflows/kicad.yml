on:
  push:
    branches: [main]
    paths-ignore:
      - 'output/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'output/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  kicad_job:
    runs-on: ubuntu-latest
    name: Run KiCad Jobs

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run KiCad actions
        id: production
        uses: actions-for-kicad/kicad-actions@v1.8-k9.0
        with:
          schematic_file_name: ./DummyLoad.kicad_sch
          run_erc: true
          schematic_output_pdf: true
          schematic_output_bom: true
          schematic_output_bom_fields: "Reference,Value,Footprint,${QUANTITY},${DNP},Mouser PN,Datasheet"
          schematic_output_bom_labels: "Refs,Value,Footprint,Qty,DNP,Mouser PN,Datasheet"

          pcb_file_name: DummyLoad.kicad_pcb
          footprint_libraries: "footprint-library=./MiscFootprints.pretty"
          run_drc: true
          pcb_output_gerbers_and_drill: true
          pcb_output_layers: "F.Cu,B.Cu,F.Adhesive,B.Adhesive,F.Paste,B.Paste,F.Silkscreen,B.Silkscreen,F.Mask,B.Mask,User.Comments,Edge.Cuts,F.Courtyard,B.Courtyard"

          schematic_output_svg: true
          pcb_output_image: true
          pcb_output_image_floor: true
          pcb_oupput_image_perspective: true
          pcb_output_image_rotate: "10,10,0"

      - name: Collect ERC/DRC diagnostics
        if: ${{ always() && steps.production.outcome != 'success' }}
        run: |
          set -euo pipefail
          mkdir -p diagnostics

          # Gather common KiCad report/log file names from workspace.
          find "${{ github.workspace }}" -type f \( \
            -iname "*erc*" -o \
            -iname "*drc*" -o \
            -iname "*.rpt" -o \
            -iname "*.report" -o \
            -iname "*.log" \
          \) -print0 | while IFS= read -r -d '' file; do
            cp --parents "$file" diagnostics/
          done

      - name: Upload ERC/DRC diagnostics
        uses: actions/upload-artifact@v7
        if: ${{ always() && steps.production.outcome != 'success' }}
        with:
          name: KiCad diagnostics (ERC-DRC)
          path: diagnostics
          if-no-files-found: warn

      - name: Verify KiCad step succeeded
        if: ${{ always() && steps.production.outcome != 'success' }}
        run: |
          echo "KiCad production step failed; stopping workflow."
          exit 1

      - name: Prepare output folder
        if: ${{ !cancelled() && steps.production.outcome == 'success' }}
        run: |
          set -euo pipefail
          mkdir -p output

          cp -f "${{ github.workspace }}/schematic.pdf" output/schematic.pdf
          cp -f "${{ github.workspace }}/bom.csv" output/bom.csv
          cp -rf "${{ github.workspace }}/gerbers" output
          cp -f "${{ github.workspace }}/schematics/DummyLoad.svg" output/schematic.svg
          cp -f "${{ github.workspace }}/pcb.png" output/pcb.png

          ls -la output

      - name: Commit generated outputs
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && !cancelled() && steps.production.outcome == 'success' }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f output/schematic.pdf output/bom.csv output/gerbers output/schematic.svg output/pcb.png

          if git diff --cached --quiet; then
            echo "No output changes to commit."
            exit 0
          fi

          git commit -m "chore(kicad): update generated outputs [skip ci]"
          git push

      - name: Upload production files
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() && steps.production.outcome == 'success' }}
        with:
          name: Production files
          path: |
            ${{ github.workspace }}/output/schematic.pdf
            ${{ github.workspace }}/output/bom.csv
            ${{ github.workspace }}/output/gerbers
            ${{ github.workspace }}/output/schematic.svg
            ${{ github.workspace }}/output/pcb.png
